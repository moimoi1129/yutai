            document.getElementById('ui-pray-status').innerText = state.pray.isRunning ? "進行中" : (state.pray.isComplete ? "完了（待機）" : "待機中");
            document.getElementById('ui-pray-time').innerText = state.pray.elapsed;
            const progress = (state.pray.elapsed / MASTER.PRAY_DURATION) * 100;
            document.getElementById('ui-pray-progress').style.width = progress + "%";

            // ボタンの有効・無効管理
            document.getElementById('btn-pray').disabled = state.pray.isRunning || state.pray.isComplete;
            document.getElementById('btn-settle').disabled = !state.pray.isComplete;

            // ヘルパー関数: マスターデータからアイテムを検索
            // CONSUMABLESとEQUIPSの両方から検索
            const findMasterItem = (id) => {
                return MASTER.CONSUMABLES.find(mItem => mItem.id === id) || MASTER.EQUIPS.find(mItem => mItem.id === id);
            };

            // インベントリ表示
            const inventoryElement = document.getElementById('ui-inventory');
            inventoryElement.innerHTML = ''; // 以前の内容をクリア
            if (state.inventory.items.length === 0) {
                inventoryElement.innerText = "アイテムなし";
            } else { // 変更: CONSUMABLESとEQUIPSの両方から検索
                // CONSUMABLESから検索
                state.inventory.items.forEach(invItem => {
                    const masterItem = findMasterItem(invItem.id); // findMasterItem を使用してマスターアイテムを取得
                    if (masterItem) {
                        const itemEntry = document.createElement('div');
                        itemEntry.innerText = `${masterItem.emoji} ${masterItem.name} x${invItem.quantity}`;
                        inventoryElement.appendChild(itemEntry);
                    }
                });
            }
            // 右パネル：生のデータをそのまま表示
            document.getElementById('raw-data').innerText = JSON.stringify(state, null, 4);
        }

        /**
         * 重みに基づいてアイテムを抽選する汎用関数
         * @param {Array<Object>} items - 抽選対象のアイテム配列。各アイテムは 'weight' プロパティを持つこと。
         * @returns {Object|null} 抽選されたアイテムオブジェクト、または抽選対象がない場合はnull
         */
        function drawItemByWeight(items) {
            const totalWeight = items.reduce((sum, item) => sum + (item.weight || 0), 0);
            if (totalWeight === 0) return null;

            let random = Math.random() * totalWeight;
            for (const item of items) {
                if (random < (item.weight || 0)) {
                    return item;
                }
                random -= (item.weight || 0);
            }
            return null; // 万が一のためのフォールバック
        }
        // ログ出力関数
        // README.md の指示に基づき、コードスニペットを受け取り、state.変数をハイライトする
        function pushLog(codeSnippet) {
            const logArea = document.getElementById('action-log');
            const time = new Date().toLocaleTimeString();
            // state. で始まる変数をハイライト
            const highlightedCode = codeSnippet.replace(/(state\.[a-zA-Z0-9_.]+)/g, '<span class="log-code-highlight">$1</span>');
            const entry = document.createElement('div');
            entry.innerHTML = `<span class="log-time">[${time}]</span> ${highlightedCode}`;
            logArea.prepend(entry);
        }

                    logMessage += `state.resources.votingRights += 1; `;

                    // 獲得したアイテムをインベントリに追加/更新
                    // findMasterItem は updateUI() のスコープで定義されているため、ここでは再定義しない
                    const itemQuantityForLog = (state.inventory.items.find(item => item.id === drawnItem.id)?.quantity || 0) + 1;
                    const itemLogText = `${drawnItem.emoji} ${drawnItem.name} x${itemQuantityForLog}`;
                    let inventoryItem = state.inventory.items.find(item => item.id === drawnItem.id);
                    if (inventoryItem) {
                        inventoryItem.quantity += 1;
                        logMessage += `state.inventory.items.find(item => item.id === "${drawnItem.id}").quantity += 1; // 獲得: ${itemLogText}`;
                    } else {
                        state.inventory.items.push({ id: drawnItem.id, quantity: 1 });
                        logMessage += `state.inventory.items.push({ id: "${drawnItem.id}", quantity: 1 }); // 獲得: ${itemLogText}`;
                    }
                } else {
                    logMessage += `// 封筒を開封しましたが、アイテムは獲得できませんでした。`;
                }
                pushLog(logMessage);
                updateUI();
            }
        };
        document.getElementById('btn-cheat').onclick = () => {
            state.resources.envelopes += 10;
            pushLog("state.resources.envelopes += 10; // デバッグ: 封筒追加");
            updateUI();
        };

        // 起動時の初期表示
        updateUI();
        pushLog("// システム起動");
    </script>
</body>

</html>
