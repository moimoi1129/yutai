<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Debug Manager - Game Logic</title>
    <style>
        body { font-family: monospace; background-color: #1a1a1a; color: #00ff00; padding: 20px; }
        .monitor-sector { border: 1px solid #333; padding: 10px; margin-bottom: 10px; }
        .control-sector { border: 1px solid #333; padding: 10px; }
        button { background: #333; color: #fff; border: 1px solid #555; cursor: pointer; padding: 5px 10px; }
        button:disabled { color: #666; }
    </style>
</head>
<body>
    <h1>Game Debug Console</h1>

    <div class="monitor-sector">
        <h3>[ State Monitor ]</h3>
        <p>Cookies: <span id="val-cookies">0</span></p>
        <p>Click Power: <span id="val-power">1</span></p>
    </div>

    <div class="control-sector">
        <h3>[ Actions ]</h3>
        <button id="btn-click">Manual Click</button>
        <button id="btn-upgrade">Buy Upgrade (Cost: 10)</button>
        <hr>
        <button id="btn-cheat">Cheat: +1000 Cookies</button>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
